name: 🗄 Database Migration

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'   # si attiva solo se cambiano i file SQL
  workflow_dispatch:               # esecuzione manuale da GitHub Actions

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push \
            --project-ref nnsylkjahuhttwajuxls \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Notify success
        if: success()
        run: echo "✅ Migrations applied successfully"

      - name: Notify failure  
        if: failure()
        run: echo "❌ Migration failed — check logs above"
