name: 🗄 Database Migration

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply all pending migrations via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF="nnsylkjahuhttwajuxls"
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"

          run_sql() {
            local label="$1"
            local sql="$2"
            echo "▶ $label"
            HTTP=$(curl -s -o /tmp/r.json -w "%{http_code}" \
              -X POST "$API" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": $(echo "$sql" | jq -Rs .)}")
            BODY=$(cat /tmp/r.json)
            if echo "$BODY" | grep -qi '"error"' && ! echo "$BODY" | grep -qi 'already exists\|duplicate\|does not exist'; then
              echo "  ❌ ERRORE: $BODY"
            else
              echo "  ✅ OK (HTTP $HTTP)"
            fi
          }

          # ──────────────────────────────────────────────────
          # 007 — Proposta A: Asset Health Card + Template
          # ──────────────────────────────────────────────────
          run_sql "007 assets: ore_utilizzo" \
            "alter table assets add column if not exists ore_utilizzo numeric(10,1) default 0;"

          run_sql "007 assets: soglia_ore" \
            "alter table assets add column if not exists soglia_ore numeric(10,1) default null;"

          run_sql "007 assets: costo_acquisto" \
            "alter table assets add column if not exists costo_acquisto numeric(12,2) default null;"

          run_sql "007 assets: garanzia_al" \
            "alter table assets add column if not exists garanzia_al date default null;"

          run_sql "007 assets: vita_utile_anni" \
            "alter table assets add column if not exists vita_utile_anni int default null;"

          run_sql "007 assets: specifiche_json" \
            "alter table assets add column if not exists specifiche_json jsonb default null;"

          run_sql "007 asset_tipo_template: crea tabella" \
            "create table if not exists asset_tipo_template (
              id            bigserial primary key,
              tenant_id     uuid references tenants(id) on delete cascade,
              tipo_asset    text not null,
              nome          text not null,
              descrizione   text,
              tipo_attivita text default 'ordinaria' check (tipo_attivita in ('ordinaria','straordinaria')),
              frequenza     text default 'mensile',
              durata        int  default 60,
              priorita      text default 'media',
              stima_costo   numeric(10,2) default null,
              attivo        boolean default true,
              created_at    timestamptz default now()
            );"

          run_sql "007 asset_tipo_template: index tenant" \
            "create index if not exists idx_template_tenant on asset_tipo_template(tenant_id);"

          run_sql "007 asset_tipo_template: index tipo" \
            "create index if not exists idx_template_tipo on asset_tipo_template(tipo_asset);"

          run_sql "007 asset_tipo_template: disable rls" \
            "alter table asset_tipo_template disable row level security;"

          run_sql "007 template_checklist_steps: crea tabella" \
            "create table if not exists template_checklist_steps (
              id           bigserial primary key,
              template_id  bigint references asset_tipo_template(id) on delete cascade,
              testo        text not null,
              obbligatorio boolean default false,
              ordine       int default 0
            );"

          run_sql "007 template_checklist_steps: disable rls" \
            "alter table template_checklist_steps disable row level security;"

          run_sql "007 template_ricambi: crea tabella" \
            "create table if not exists template_ricambi (
              id           bigserial primary key,
              template_id  bigint references asset_tipo_template(id) on delete cascade,
              ricambio_id  bigint references ricambi(id) on delete set null,
              nome_libero  text,
              quantita     numeric(10,2) default 1,
              note         text
            );"

          run_sql "007 template_ricambi: disable rls" \
            "alter table template_ricambi disable row level security;"

          run_sql "007 piani: template_id" \
            "alter table piani add column if not exists template_id bigint references asset_tipo_template(id) on delete set null;"

          run_sql "007 piani: stima_costo" \
            "alter table piani add column if not exists stima_costo numeric(10,2) default null;"

          # ──────────────────────────────────────────────────
          # 008 — Codice cliente
          # ──────────────────────────────────────────────────
          run_sql "008 clienti: codice" \
            "alter table clienti add column if not exists codice text default null;"

          run_sql "008 clienti: genera codici esistenti" \
            "update clienti set codice = upper(regexp_replace(left(rs, 4), '[^A-Za-z0-9]', '', 'g')) || id::text where codice is null;"

          # ──────────────────────────────────────────────────
          # 009 — SLA Profili
          # ──────────────────────────────────────────────────
          run_sql "009 sla_profili: crea tabella" \
            "create table if not exists sla_profili (
              id          bigserial primary key,
              tenant_id   uuid references tenants(id) on delete cascade,
              nome        text not null,
              descrizione text,
              colore      text default '#3B82F6',
              is_default  boolean default false,
              created_at  timestamptz default now()
            );"

          run_sql "009 sla_profili: index" \
            "create index if not exists idx_sla_profili_tenant on sla_profili(tenant_id);"

          run_sql "009 sla_profili: disable rls" \
            "alter table sla_profili disable row level security;"

          run_sql "009 sla_profilo_config: crea tabella" \
            "create table if not exists sla_profilo_config (
              id              bigserial primary key,
              profilo_id      bigint references sla_profili(id) on delete cascade,
              priorita        text check (priorita in ('bassa','media','alta','urgente')),
              ore_risposta    int default 24,
              ore_risoluzione int default 72
            );"

          run_sql "009 sla_profilo_config: disable rls" \
            "alter table sla_profilo_config disable row level security;"

          run_sql "009 clienti: sla_profilo_id" \
            "alter table clienti add column if not exists sla_profilo_id bigint references sla_profili(id) on delete set null;"

          run_sql "009 migra sla_config → profilo Standard" \
            "insert into sla_profili (tenant_id, nome, descrizione, is_default)
              select distinct tenant_id, 'Standard', 'Profilo SLA predefinito', true
              from sla_config where tenant_id is not null
              on conflict do nothing;"

          run_sql "009 migra voci sla_config → sla_profilo_config" \
            "insert into sla_profilo_config (profilo_id, priorita, ore_risposta, ore_risoluzione)
              select p.id, s.priorita, s.ore_risposta, s.ore_risoluzione
              from sla_config s
              join sla_profili p on p.tenant_id = s.tenant_id and p.is_default = true
              on conflict do nothing;"

          # ──────────────────────────────────────────────────
          # 010 — SLA voci custom libere
          # ──────────────────────────────────────────────────
          run_sql "010 sla_profilo_config: nome" \
            "alter table sla_profilo_config add column if not exists nome text;"

          run_sql "010 sla_profilo_config: note" \
            "alter table sla_profilo_config add column if not exists note text;"

          run_sql "010 sla_profilo_config: priorita nullable" \
            "alter table sla_profilo_config alter column priorita drop not null;"

          run_sql "010 sla_profilo_config: drop unique constraint" \
            "alter table sla_profilo_config drop constraint if exists sla_profilo_config_profilo_id_priorita_key;"

          run_sql "010 sla_profilo_config: partial unique index" \
            "create unique index if not exists idx_sla_config_priorita_unica
              on sla_profilo_config(profilo_id, priorita)
              where priorita is not null;"

          run_sql "010 sla_profilo_config: ordine" \
            "alter table sla_profilo_config add column if not exists ordine int default 0;"

          run_sql "010 sla_profilo_config: popola nome esistenti" \
            "update sla_profilo_config set nome = case priorita
              when 'urgente' then 'Urgente'
              when 'alta'    then 'Alta priorità'
              when 'media'   then 'Media priorità'
              when 'bassa'   then 'Bassa priorità'
              else 'SLA generico' end
            where nome is null;"

          # ──────────────────────────────────────────────────
          # 015 — Piano voci (attività template) + piano_siti (applicazione a sito)
          # ──────────────────────────────────────────────────
          run_sql "015 piano_voci: tabella attività template" \
            "create table if not exists piano_voci (
              id          bigserial primary key,
              piano_id    bigint references piani(id) on delete cascade,
              tenant_id   uuid references tenants(id) on delete cascade,
              titolo      text not null,
              frequenza   text default 'mensile'
                check (frequenza in ('settimanale','mensile','bimestrale','trimestrale','semestrale','annuale')),
              durata      int  default 60,
              tipo        text default 'ordinaria',
              priorita    text default 'media',
              note        text,
              categoria   text,
              ordine      int  default 0,
              attivo      boolean default true,
              created_at  timestamptz default now()
            );
            create index if not exists idx_piano_voci_piano on piano_voci(piano_id);
            alter table piano_voci disable row level security;"

          run_sql "015 piano_siti: applicazione piano a sito" \
            "create table if not exists piano_siti (
              id            bigserial primary key,
              piano_id      bigint references piani(id) on delete cascade,
              cliente_id    bigint references clienti(id) on delete cascade,
              tenant_id     uuid references tenants(id) on delete cascade,
              operatore_id  bigint references operatori(id) on delete set null,
              data_inizio   date,
              data_fine     date,
              attivo        boolean default true,
              note          text,
              created_at    timestamptz default now()
            );
            create index if not exists idx_piano_siti_piano   on piano_siti(piano_id);
            create index if not exists idx_piano_siti_cliente on piano_siti(cliente_id);
            alter table piano_siti disable row level security;"

          run_sql "015 piani: aggregazione_odl" \
            "alter table piani add column if not exists aggregazione_odl text default 'per_visita'
             check (aggregazione_odl in ('per_visita','per_attivita','per_mese','per_categoria'));
             alter table piani add column if not exists cliente_id bigint references clienti(id) on delete set null;
             alter table piani add column if not exists data_inizio date;
             alter table piani add column if not exists data_fine date;"

          run_sql "015 manutenzioni: piano_sito_id" \
            "alter table manutenzioni add column if not exists piano_sito_id bigint references piano_siti(id) on delete set null;
             alter table manutenzioni add column if not exists piano_voce_id bigint references piano_voci(id) on delete set null;"

          # ──────────────────────────────────────────────────
          # 000 — Tabella allegati + bucket storage
          # ──────────────────────────────────────────────────
          run_sql "000 allegati: crea tabella" \
            "create table if not exists allegati (
              id           bigserial primary key,
              tenant_id    uuid references tenants(id) on delete cascade,
              entita_tipo  text not null,
              entita_id    bigint not null,
              nome         text not null,
              storage_path text not null,
              mime_type    text default '',
              dimensione   bigint default 0,
              user_id      uuid,
              created_at   timestamptz default now()
            );"

          run_sql "000 allegati: indici" \
            "create index if not exists idx_allegati_entita on allegati(entita_tipo, entita_id);
             alter table allegati disable row level security;"

          run_sql "000 allegati: storage bucket" \
            "insert into storage.buckets (id, name, public, file_size_limit, allowed_mime_types)
             values ('allegati', 'allegati', false, 20971520, null)
             on conflict (id) do nothing;"

          run_sql "000 allegati: storage policy upload" \
            "create policy if not exists \"allegati_upload\"
             on storage.objects for insert to authenticated
             with check (bucket_id = 'allegati');"

          run_sql "000 allegati: storage policy read" \
            "create policy if not exists \"allegati_read\"
             on storage.objects for select to authenticated
             using (bucket_id = 'allegati');"

          run_sql "000 allegati: storage policy delete" \
            "create policy if not exists \"allegati_delete\"
             on storage.objects for delete to authenticated
             using (bucket_id = 'allegati');"

          # ──────────────────────────────────────────────────
          # 013 — Ordini di Lavoro (OdL)
          # ──────────────────────────────────────────────────
          run_sql "013 ordini_lavoro: crea tabella" \
            "create table if not exists ordini_lavoro (
              id            bigserial primary key,
              tenant_id     uuid references tenants(id) on delete cascade,
              piano_id      bigint references piani(id) on delete set null,
              cliente_id    bigint references clienti(id) on delete set null,
              operatore_id  bigint references operatori(id) on delete set null,
              numero        text,
              titolo        text not null,
              descrizione   text,
              stato         text default 'bozza'
                check (stato in ('bozza','confermato','in_corso','completato','annullato')),
              data_inizio   date not null,
              data_fine     date,
              durata_stimata int,
              note          text,
              created_by    uuid,
              created_at    timestamptz default now()
            );"

          run_sql "013 ordini_lavoro: indici" \
            "create index if not exists idx_odl_tenant  on ordini_lavoro(tenant_id);
             create index if not exists idx_odl_piano   on ordini_lavoro(piano_id);
             create index if not exists idx_odl_cliente on ordini_lavoro(cliente_id);
             create index if not exists idx_odl_data    on ordini_lavoro(data_inizio);
             alter table ordini_lavoro disable row level security;"

          run_sql "013 manutenzioni: odl_id" \
            "alter table manutenzioni add column if not exists odl_id bigint references ordini_lavoro(id) on delete set null;
             create index if not exists idx_man_odl on manutenzioni(odl_id);"

          # ──────────────────────────────────────────────────
          # 012 — Piano voci scope (asset|area|generale)
          # ──────────────────────────────────────────────────
          run_sql "012 piani: cliente_id" \
            "alter table piani add column if not exists cliente_id bigint references clienti(id) on delete set null;"

          run_sql "012 piani: data_inizio + data_fine" \
            "alter table piani add column if not exists data_inizio date default null;
             alter table piani add column if not exists data_fine   date default null;"

          run_sql "012 piano_assegnazioni: titolo" \
            "alter table piano_assegnazioni add column if not exists titolo text;"

          run_sql "012 piano_assegnazioni: scope" \
            "alter table piano_assegnazioni add column if not exists scope text default 'asset' check (scope in ('asset','area','generale'));"

          run_sql "012 piano_assegnazioni: area_nome" \
            "alter table piano_assegnazioni add column if not exists area_nome text;"

          run_sql "012 piano_assegnazioni: frequenza" \
            "alter table piano_assegnazioni add column if not exists frequenza text;"

          run_sql "012 piano_assegnazioni: durata" \
            "alter table piano_assegnazioni add column if not exists durata int;"

          run_sql "012 piano_assegnazioni: tipo + priorita + note" \
            "alter table piano_assegnazioni add column if not exists tipo text;
             alter table piano_assegnazioni add column if not exists priorita text;
             alter table piano_assegnazioni add column if not exists note text;"

          # ──────────────────────────────────────────────────
          # 011 — Snapshot SLA su manutenzioni (C+D)
          # ──────────────────────────────────────────────────
          run_sql "011 manutenzioni: sla_profilo_id snapshot" \
            "alter table manutenzioni add column if not exists sla_profilo_id bigint references sla_profili(id) on delete set null;"

          # ──────────────────────────────────────────────────
          # 012 — Piano voci flessibili (scope asset|area|generale)
          # ──────────────────────────────────────────────────
          run_sql "012 piano_assegnazioni: titolo" \
            "alter table piano_assegnazioni add column if not exists titolo text;"

          run_sql "012 piano_assegnazioni: scope" \
            "alter table piano_assegnazioni add column if not exists scope text default 'asset' check (scope in ('asset','area','generale'));"

          run_sql "012 piano_assegnazioni: area_nome" \
            "alter table piano_assegnazioni add column if not exists area_nome text;"

          run_sql "012 piano_assegnazioni: frequenza" \
            "alter table piano_assegnazioni add column if not exists frequenza text;"

          run_sql "012 piano_assegnazioni: durata" \
            "alter table piano_assegnazioni add column if not exists durata int;"

          run_sql "012 piano_assegnazioni: tipo" \
            "alter table piano_assegnazioni add column if not exists tipo text;"

          run_sql "012 piano_assegnazioni: priorita" \
            "alter table piano_assegnazioni add column if not exists priorita text;"

          run_sql "012 piano_assegnazioni: note" \
            "alter table piano_assegnazioni add column if not exists note text;"

          run_sql "012 piani: cliente_id" \
            "alter table piani add column if not exists cliente_id bigint references clienti(id) on delete set null;"

          run_sql "012 piani: data_inizio" \
            "alter table piani add column if not exists data_inizio date;"

          run_sql "012 piani: data_fine" \
            "alter table piani add column if not exists data_fine date;"

          # ──────────────────────────────────────────────────
          # 006 — Proposta B (se non già applicata)
          # ──────────────────────────────────────────────────
          run_sql "006 attivita_commenti" \
            "create table if not exists attivita_commenti (
              id              bigserial primary key,
              manutenzione_id bigint references manutenzioni(id) on delete cascade,
              tenant_id       uuid references tenants(id) on delete cascade,
              autore_id       bigint references operatori(id) on delete set null,
              autore_nome     text not null,
              testo           text not null,
              tipo            text default 'nota' check (tipo in ('nota','approvazione','rifiuto','richiesta')),
              created_at      timestamptz default now()
            );"

          run_sql "006 attivita_commenti: index" \
            "create index if not exists idx_commenti_man on attivita_commenti(manutenzione_id);"

          run_sql "006 attivita_commenti: disable rls" \
            "alter table attivita_commenti disable row level security;"

          run_sql "006 sla_config" \
            "create table if not exists sla_config (
              id              bigserial primary key,
              tenant_id       uuid references tenants(id) on delete cascade,
              priorita        text not null check (priorita in ('bassa','media','alta','urgente')),
              ore_risposta    int default 24,
              ore_risoluzione int default 72,
              created_at      timestamptz default now(),
              unique(tenant_id, priorita)
            );"

          run_sql "006 sla_config: disable rls" \
            "alter table sla_config disable row level security;"

          run_sql "006 ordini_acquisto" \
            "create table if not exists ordini_acquisto (
              id          bigserial primary key,
              tenant_id   uuid references tenants(id) on delete cascade,
              numero      text,
              fornitore   text,
              stato       text default 'bozza' check (stato in ('bozza','inviato','confermato','ricevuto','annullato')),
              note        text,
              data_ordine date,
              data_attesa date,
              totale      numeric(10,2),
              created_by  bigint references operatori(id) on delete set null,
              created_at  timestamptz default now(),
              updated_at  timestamptz default now()
            );"

          run_sql "006 ordini_acquisto_righe" \
            "create table if not exists ordini_acquisto_righe (
              id              bigserial primary key,
              ordine_id       bigint references ordini_acquisto(id) on delete cascade,
              ricambio_id     bigint references ricambi(id) on delete set null,
              nome_libero     text,
              quantita        numeric(10,2) default 1,
              prezzo_unitario numeric(10,2),
              note            text
            );"

          run_sql "006 ordini_acquisto: index + rls" \
            "create index if not exists idx_ordini_tenant on ordini_acquisto(tenant_id);
             alter table ordini_acquisto disable row level security;
             alter table ordini_acquisto_righe disable row level security;"

          run_sql "006 ricambi: soglia + stock" \
            "alter table ricambi add column if not exists soglia_minima int default 0;
             alter table ricambi add column if not exists quantita_stock int default 0;"

          run_sql "006 operatori: tariffa_ora" \
            "alter table operatori add column if not exists tariffa_ora numeric(10,2) default 0;"

          # ──────────────────────────────────────────────────
          # 011 — SLA snapshot su manutenzioni (opzione C)
          # ──────────────────────────────────────────────────
          run_sql "011 manutenzioni: sla_profilo_id (snapshot chiusura)" \
            "alter table manutenzioni add column if not exists sla_profilo_id bigint references sla_profili(id) on delete set null;"

          # ──────────────────────────────────────────────────
          # 016 — Workflow B: ordinaria vs straordinaria
          # ──────────────────────────────────────────────────
          run_sql "016 manutenzioni: campi straordinaria" \
            "alter table manutenzioni add column if not exists sottotipo text
               check (sottotipo in ('preventiva','correttiva','urgente','miglioria','normativa'));
             alter table manutenzioni add column if not exists causa_guasto text;
             alter table manutenzioni add column if not exists fermo_impianto boolean default false;
             alter table manutenzioni add column if not exists downtime_ore numeric(6,2);
             alter table manutenzioni add column if not exists approvata_da bigint references operatori(id) on delete set null;
             alter table manutenzioni add column if not exists approvata_at timestamptz;
             alter table manutenzioni add column if not exists rifiutata_motivo text;"

          echo ""
          echo "🎉 Tutte le migration applicate!"
