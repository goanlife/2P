name: 🗄 Database Migration

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply migrations via psql
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          sudo apt-get install -y postgresql-client

          DB_URL="postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.nnsylkjahuhttwajuxls.supabase.co:5432/postgres"

          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "▶ Applying: $f"
            psql "$DB_URL" -f "$f" -v ON_ERROR_STOP=1
            echo "✅ Done: $f"
          done

          echo "🎉 All migrations applied!"
