name: 🗄 Database Migration

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply all migrations via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF="nnsylkjahuhttwajuxls"
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"

          run_sql() {
            local label="$1"
            local sql="$2"
            echo "▶ $label"
            HTTP=$(curl -s -o /tmp/r.json -w "%{http_code}" \
              -X POST "$API" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": $(echo "$sql" | jq -Rs .)}")
            BODY=$(cat /tmp/r.json)
            if echo "$BODY" | grep -qi '"error"' && ! echo "$BODY" | grep -qi 'already exists\|duplicate\|does not exist\|multiple primary\|42701\|42P07\|42P16'; then
              echo "  ❌ ERRORE: $BODY"
            else
              echo "  ✅ OK (HTTP $HTTP)"
            fi
          }

          # ══════════════════════════════════════════════════════
          # FASE 1 — Tabelle base (idempotenti)
          # ══════════════════════════════════════════════════════

          run_sql "tenants: tabella" \
            "create table if not exists tenants (
              id            uuid primary key default gen_random_uuid(),
              nome          text,
              piva          text,
              indirizzo     text,
              tel           text,
              email         text,
              logo_url      text,
              codice_invito text unique,
              citta         text,
              cap           text,
              sito          text,
              owner_id      uuid references auth.users(id),
              created_at    timestamptz default now()
            );
            alter table tenants disable row level security;"

          run_sql "tenant_users: tabella" \
            "create table if not exists tenant_users (
              id         bigserial primary key,
              tenant_id  uuid references tenants(id) on delete cascade,
              user_id    uuid references auth.users(id) on delete cascade,
              ruolo      text default 'membro',
              created_at timestamptz default now(),
              unique(tenant_id, user_id)
            );
            alter table tenant_users disable row level security;"

          run_sql "tenant_inviti: tabella" \
            "create table if not exists tenant_inviti (
              id         bigserial primary key,
              tenant_id  uuid references tenants(id) on delete cascade,
              codice     text unique not null,
              email      text,
              ruolo      text default 'membro',
              usato      boolean default false,
              usato_da   uuid references auth.users(id),
              created_at timestamptz default now(),
              expires_at timestamptz
            );
            alter table tenant_inviti disable row level security;"

          run_sql "tenant_membri: tabella" \
            "create table if not exists tenant_membri (
              id         bigserial primary key,
              tenant_id  uuid references tenants(id) on delete cascade,
              user_id    uuid references auth.users(id) on delete cascade,
              ruolo      text default 'membro',
              created_at timestamptz default now(),
              unique(tenant_id, user_id)
            );
            alter table tenant_membri disable row level security;"

          # ══════════════════════════════════════════════════════
          # FASE 2 — Patch tabelle principali (ADD COLUMN IF NOT EXISTS)
          # ══════════════════════════════════════════════════════

          run_sql "clienti: tenant_id" \
            "alter table clienti add column if not exists tenant_id uuid references tenants(id) on delete cascade;"

          run_sql "clienti: codice" \
            "alter table clienti add column if not exists codice text;"

          run_sql "clienti: sla_profilo_id" \
            "alter table clienti add column if not exists sla_profilo_id bigint;"

          run_sql "assets: tenant_id" \
            "alter table assets add column if not exists tenant_id uuid references tenants(id) on delete cascade;"

          run_sql "assets: ore_utilizzo" \
            "alter table assets add column if not exists ore_utilizzo numeric(10,1) default 0;"

          run_sql "assets: soglia_ore" \
            "alter table assets add column if not exists soglia_ore numeric(10,1);"

          run_sql "assets: costo_acquisto" \
            "alter table assets add column if not exists costo_acquisto numeric(12,2);"

          run_sql "assets: garanzia_al" \
            "alter table assets add column if not exists garanzia_al date;"

          run_sql "assets: vita_utile_anni" \
            "alter table assets add column if not exists vita_utile_anni int;"

          run_sql "assets: specifiche_json" \
            "alter table assets add column if not exists specifiche_json jsonb;"

          run_sql "operatori: tenant_id" \
            "alter table operatori add column if not exists tenant_id uuid references tenants(id) on delete cascade;"

          run_sql "operatori: email" \
            "alter table operatori add column if not exists email text;"

          run_sql "operatori: tema" \
            "alter table operatori add column if not exists tema text default 'navy';"

          run_sql "operatori: tariffa_ora" \
            "alter table operatori add column if not exists tariffa_ora numeric(8,2);"

          run_sql "operatori: auth_user_id" \
            "alter table operatori add column if not exists auth_user_id uuid references auth.users(id) on delete set null;"

          run_sql "piani: tenant_id" \
            "alter table piani add column if not exists tenant_id uuid references tenants(id) on delete cascade;"

          run_sql "piani: aggregazione_odl" \
            "alter table piani add column if not exists aggregazione_odl text default 'per_visita'
               check (aggregazione_odl in ('per_visita','per_attivita','per_mese','per_categoria'));"

          run_sql "manutenzioni: tenant_id" \
            "alter table manutenzioni add column if not exists tenant_id uuid references tenants(id) on delete cascade;"

          run_sql "manutenzioni: note_chiusura" \
            "alter table manutenzioni add column if not exists note_chiusura text;"

          run_sql "manutenzioni: ore_effettive" \
            "alter table manutenzioni add column if not exists ore_effettive numeric(6,2);"

          run_sql "manutenzioni: parti_usate" \
            "alter table manutenzioni add column if not exists parti_usate text;"

          run_sql "manutenzioni: firma_svg" \
            "alter table manutenzioni add column if not exists firma_svg text;"

          run_sql "manutenzioni: chiuso_at" \
            "alter table manutenzioni add column if not exists chiuso_at timestamptz;"

          run_sql "manutenzioni: numero_intervento" \
            "alter table manutenzioni add column if not exists numero_intervento int default 1;"

          run_sql "manutenzioni: sla_profilo_id" \
            "alter table manutenzioni add column if not exists sla_profilo_id bigint;"

          run_sql "manutenzioni: odl_id" \
            "alter table manutenzioni add column if not exists odl_id bigint;"

          run_sql "manutenzioni: assegnazione_id" \
            "alter table manutenzioni add column if not exists assegnazione_id bigint;"

          run_sql "manutenzioni: sottotipo" \
            "alter table manutenzioni add column if not exists sottotipo text;"

          run_sql "manutenzioni: causa_guasto" \
            "alter table manutenzioni add column if not exists causa_guasto text;"

          run_sql "manutenzioni: fermo_impianto" \
            "alter table manutenzioni add column if not exists fermo_impianto boolean default false;"

          run_sql "manutenzioni: downtime_ore" \
            "alter table manutenzioni add column if not exists downtime_ore numeric(6,2);"

          run_sql "manutenzioni: approvata_da" \
            "alter table manutenzioni add column if not exists approvata_da bigint;"

          run_sql "manutenzioni: approvata_at" \
            "alter table manutenzioni add column if not exists approvata_at timestamptz;"

          run_sql "manutenzioni: rifiutata_motivo" \
            "alter table manutenzioni add column if not exists rifiutata_motivo text;"

          run_sql "manutenzioni: piano_sito_id" \
            "alter table manutenzioni add column if not exists piano_sito_id bigint;"

          run_sql "manutenzioni: piano_voce_id" \
            "alter table manutenzioni add column if not exists piano_voce_id bigint;"

          # ══════════════════════════════════════════════════════
          # FASE 3 — Nuove tabelle (SLA, OdL, Checklist, ecc.)
          # ══════════════════════════════════════════════════════

          run_sql "sla_profili: tabella" \
            "create table if not exists sla_profili (
              id         bigserial primary key,
              nome       text not null,
              colore     text default '#3B82F6',
              is_default boolean default false,
              tenant_id  uuid references tenants(id) on delete cascade,
              user_id    uuid,
              created_at timestamptz default now()
            );
            alter table sla_profili disable row level security;"

          run_sql "sla_profilo_config: tabella" \
            "create table if not exists sla_profilo_config (
              id                bigserial primary key,
              profilo_id        bigint references sla_profili(id) on delete cascade,
              priorita          text,
              ore_risposta      int,
              ore_risoluzione   int,
              note              text,
              tenant_id         uuid references tenants(id) on delete cascade
            );
            alter table sla_profilo_config disable row level security;"

          run_sql "sla_config: tabella" \
            "create table if not exists sla_config (
              id                bigserial primary key,
              tenant_id         uuid references tenants(id) on delete cascade,
              priorita          text,
              ore_risposta      int,
              ore_risoluzione   int
            );
            alter table sla_config disable row level security;"

          run_sql "ricambi: tabella" \
            "create table if not exists ricambi (
              id              bigserial primary key,
              nome            text not null,
              codice          text,
              unita           text default 'pz',
              prezzo          numeric(10,2) default 0,
              quantita_stock  numeric(10,2) default 0,
              soglia_minima   numeric(10,2) default 0,
              categoria       text,
              note            text,
              tenant_id       uuid references tenants(id) on delete cascade,
              user_id         uuid,
              created_at      timestamptz default now()
            );
            alter table ricambi disable row level security;"

          run_sql "intervento_ricambi: tabella" \
            "create table if not exists intervento_ricambi (
              id              bigserial primary key,
              manutenzione_id bigint references manutenzioni(id) on delete cascade,
              ricambio_id     bigint references ricambi(id) on delete set null,
              nome_libero     text,
              quantita        numeric(10,2) default 1,
              prezzo_unitario numeric(10,2) default 0,
              note            text,
              tenant_id       uuid references tenants(id) on delete cascade
            );
            alter table intervento_ricambi disable row level security;"

          run_sql "ordini_acquisto: tabella" \
            "create table if not exists ordini_acquisto (
              id          bigserial primary key,
              fornitore   text,
              stato       text default 'bozza',
              data_ordine date,
              note        text,
              totale      numeric(12,2) default 0,
              tenant_id   uuid references tenants(id) on delete cascade,
              user_id     uuid,
              created_at  timestamptz default now(),
              updated_at  timestamptz default now()
            );
            alter table ordini_acquisto disable row level security;"

          run_sql "ordini_acquisto: colonne mancanti (idempotente)" \
            "alter table ordini_acquisto
               add column if not exists numero      text,
               add column if not exists data_attesa date,
               add column if not exists created_by  bigint;
             alter table ordini_acquisto_righe
               add column if not exists nome_libero text,
               add column if not exists codice      text;"

          run_sql "fornitori_acquisto: anagrafica fornitori" \
            "create table if not exists fornitori_acquisto (
               id          bigserial primary key,
               nome        text not null,
               codice      text,
               piva        text,
               email       text,
               tel         text,
               indirizzo   text,
               note        text,
               attivo      boolean default true,
               tenant_id   uuid references tenants(id) on delete cascade,
               created_at  timestamptz default now()
             );
             create index if not exists idx_fornitori_acq_tenant on fornitori_acquisto(tenant_id);
             alter table fornitori_acquisto disable row level security;"

          run_sql "ordini_acquisto_righe: tabella" \
            "create table if not exists ordini_acquisto_righe (
              id              bigserial primary key,
              ordine_id       bigint references ordini_acquisto(id) on delete cascade,
              ricambio_id     bigint references ricambi(id) on delete set null,
              descrizione     text,
              codice          text,
              quantita        numeric(10,2) default 1,
              prezzo_unitario numeric(12,2) default 0,
              note            text,
              tenant_id       uuid references tenants(id) on delete cascade
            );
            alter table ordini_acquisto_righe disable row level security;"

          run_sql "ordine_righe: tabella (alias)" \
            "create table if not exists ordine_righe (
              id              bigserial primary key,
              ordine_id       bigint references ordini_acquisto(id) on delete cascade,
              ricambio_id     bigint references ricambi(id) on delete set null,
              descrizione     text,
              codice          text,
              quantita        numeric(10,2) default 1,
              prezzo_unitario numeric(12,2) default 0,
              note            text,
              tenant_id       uuid references tenants(id) on delete cascade
            );
            alter table ordine_righe disable row level security;"

          run_sql "ordini_lavoro: tabella" \
            "create table if not exists ordini_lavoro (
              id              bigserial primary key,
              titolo          text,
              numero          text,
              stato           text default 'bozza',
              piano_id        bigint references piani(id) on delete set null,
              cliente_id      bigint references clienti(id) on delete set null,
              operatore_id    bigint references operatori(id) on delete set null,
              data_inizio     date,
              data_fine       date,
              durata_stimata  int default 0,
              n_attivita      int default 0,
              note            text,
              completato_at   timestamptz,
              tenant_id       uuid references tenants(id) on delete cascade,
              user_id         uuid,
              created_at      timestamptz default now()
            );
            create index if not exists idx_odl_tenant on ordini_lavoro(tenant_id);
            alter table ordini_lavoro disable row level security;"

          run_sql "piano_assegnazioni: tabella" \
            "create table if not exists piano_assegnazioni (
              id           bigserial primary key,
              piano_id     bigint references piani(id) on delete cascade,
              asset_id     bigint references assets(id) on delete set null,
              cliente_id   bigint references clienti(id) on delete set null,
              operatore_id bigint references operatori(id) on delete set null,
              data_inizio  date,
              data_fine    date,
              attivo       boolean default true,
              titolo       text,
              scope        text default 'asset',
              area_nome    text,
              frequenza    text,
              durata       int,
              tipo         text,
              priorita     text,
              note         text,
              tenant_id    uuid references tenants(id) on delete cascade,
              user_id      uuid,
              created_at   timestamptz default now()
            );
            alter table piano_assegnazioni disable row level security;"

          run_sql "piano_voci: tabella" \
            "create table if not exists piano_voci (
              id          bigserial primary key,
              piano_id    bigint references piani(id) on delete cascade,
              titolo      text,
              testo       text,
              frequenza   text default 'mensile',
              durata      int default 60,
              tipo        text default 'ordinaria',
              priorita    text default 'media',
              note        text,
              categoria   text,
              ordine      int default 0,
              attivo      boolean default true,
              user_id     uuid,
              tenant_id   uuid references tenants(id) on delete cascade,
              created_at  timestamptz default now()
            );
            create index if not exists idx_piano_voci_piano on piano_voci(piano_id);
            alter table piano_voci disable row level security;"

          run_sql "piano_siti: tabella" \
            "create table if not exists piano_siti (
              id           bigserial primary key,
              piano_id     bigint references piani(id) on delete cascade,
              cliente_id   bigint references clienti(id) on delete cascade,
              operatore_id bigint references operatori(id) on delete set null,
              data_inizio  date,
              data_fine    date,
              attivo       boolean default true,
              note         text,
              user_id      uuid,
              tenant_id    uuid references tenants(id) on delete cascade,
              created_at   timestamptz default now()
            );
            create index if not exists idx_piano_siti_piano on piano_siti(piano_id);
            create index if not exists idx_piano_siti_cliente on piano_siti(cliente_id);
            alter table piano_siti disable row level security;"

          run_sql "piano_checklist: tabella" \
            "create table if not exists piano_checklist (
              id                bigserial primary key,
              piano_id          bigint references piani(id) on delete cascade,
              titolo            text,
              testo             text,
              obbligatorio      boolean default true,
              ogni_n_interventi int default 1,
              ordine            int default 0,
              tenant_id         uuid references tenants(id) on delete cascade
            );
            create index if not exists idx_piano_checklist_piano on piano_checklist(piano_id);
            alter table piano_checklist disable row level security;"

          run_sql "manutenzione_checklist: tabella" \
            "create table if not exists manutenzione_checklist (
              id              bigserial primary key,
              manutenzione_id bigint references manutenzioni(id) on delete cascade,
              step_id         bigint references piano_checklist(id) on delete cascade,
              completato      boolean default false,
              completato_at   timestamptz,
              tenant_id       uuid references tenants(id) on delete cascade
            );
            create index if not exists idx_man_checklist_man on manutenzione_checklist(manutenzione_id);
            alter table manutenzione_checklist disable row level security;"

          run_sql "allegati: tabella" \
            "create table if not exists allegati (
              id          bigserial primary key,
              entita_tipo text,
              entita_id   bigint,
              nome        text not null,
              storage_path text not null,
              mime_type   text,
              dimensione  bigint default 0,
              user_id     uuid,
              tenant_id   uuid references tenants(id) on delete cascade,
              created_at  timestamptz default now()
            );
            create index if not exists idx_allegati_entita on allegati(entita_tipo, entita_id);
            alter table allegati disable row level security;"

          run_sql "allegati_manutenzione: tabella" \
            "create table if not exists allegati_manutenzione (
              id              bigserial primary key,
              manutenzione_id bigint references manutenzioni(id) on delete cascade,
              nome            text not null,
              storage_path    text not null,
              mime_type       text,
              dimensione      bigint default 0,
              user_id         uuid,
              tenant_id       uuid references tenants(id) on delete cascade,
              created_at      timestamptz default now()
            );
            create index if not exists idx_allegati_man on allegati_manutenzione(manutenzione_id);
            alter table allegati_manutenzione disable row level security;"

          run_sql "log_attivita: tabella" \
            "create table if not exists log_attivita (
              id              bigserial primary key,
              entita_tipo     text,
              entita_id       bigint,
              azione          text,
              dettagli        jsonb,
              operatore_nome  text,
              user_id         uuid,
              tenant_id       uuid references tenants(id) on delete cascade,
              created_at      timestamptz default now()
            );
            alter table log_attivita disable row level security;"

          run_sql "loghi: tabella" \
            "create table if not exists loghi (
              id        bigserial primary key,
              tenant_id uuid references tenants(id) on delete cascade unique,
              logo_url  text,
              updated_at timestamptz default now()
            );
            alter table loghi disable row level security;"

          run_sql "attivita_commenti: tabella" \
            "create table if not exists attivita_commenti (
              id              bigserial primary key,
              manutenzione_id bigint references manutenzioni(id) on delete cascade,
              testo           text not null,
              tipo            text default 'commento',
              autore_id       bigint references operatori(id) on delete set null,
              autore_nome     text,
              user_id         uuid,
              tenant_id       uuid references tenants(id) on delete cascade,
              created_at      timestamptz default now()
            );
            alter table attivita_commenti disable row level security;"

          run_sql "gruppi: tabella" \
            "create table if not exists gruppi (
              id          bigserial primary key,
              nome        text not null,
              descrizione text,
              col         text default '#3B82F6',
              tenant_id   uuid references tenants(id) on delete cascade,
              user_id     uuid,
              created_at  timestamptz default now()
            );
            create index if not exists idx_gruppi_tenant on gruppi(tenant_id);
            alter table gruppi disable row level security;"

          run_sql "gruppo_operatori: tabella" \
            "create table if not exists gruppo_operatori (
              id           bigserial primary key,
              gruppo_id    bigint references gruppi(id) on delete cascade,
              operatore_id bigint references operatori(id) on delete cascade,
              created_at   timestamptz default now(),
              unique(gruppo_id, operatore_id)
            );
            alter table gruppo_operatori disable row level security;"

          run_sql "gruppo_siti: tabella" \
            "create table if not exists gruppo_siti (
              id          bigserial primary key,
              gruppo_id   bigint references gruppi(id) on delete cascade,
              cliente_id  bigint references clienti(id) on delete cascade,
              created_at  timestamptz default now(),
              unique(gruppo_id, cliente_id)
            );
            alter table gruppo_siti disable row level security;"

          run_sql "menu_config: tabella" \
            "create table if not exists menu_config (
              id         bigserial primary key,
              gruppo_id  bigint references gruppi(id) on delete cascade,
              tab_id     text not null,
              visibile   boolean default true,
              tenant_id  uuid references tenants(id) on delete cascade,
              created_at timestamptz default now()
            );
            alter table menu_config disable row level security;"

          run_sql "scadenze_normative: tabella" \
            "create table if not exists scadenze_normative (
              id                    bigserial primary key,
              titolo                text not null,
              cliente_id            bigint references clienti(id) on delete set null,
              asset_id              bigint references assets(id) on delete set null,
              scadenza              date not null,
              frequenza_mesi        int default 12,
              stato                 text default 'attiva',
              riferimento_normativo text,
              note                  text,
              user_id               uuid,
              tenant_id             uuid references tenants(id) on delete cascade,
              created_at            timestamptz default now()
            );
            create index if not exists idx_scadenze_tenant on scadenze_normative(tenant_id);
            alter table scadenze_normative disable row level security;"

          run_sql "asset_tipo_template: tabella" \
            "create table if not exists asset_tipo_template (
              id            bigserial primary key,
              tenant_id     uuid references tenants(id) on delete cascade,
              tipo_asset    text not null,
              nome          text not null,
              descrizione   text,
              tipo_attivita text default 'ordinaria',
              frequenza     text default 'mensile',
              durata        int default 60,
              priorita      text default 'media',
              stima_costo   numeric(10,2),
              attivo        boolean default true,
              created_at    timestamptz default now()
            );
            create index if not exists idx_template_tenant on asset_tipo_template(tenant_id);
            alter table asset_tipo_template disable row level security;"

          run_sql "template_checklist_steps: tabella" \
            "create table if not exists template_checklist_steps (
              id          bigserial primary key,
              template_id bigint references asset_tipo_template(id) on delete cascade,
              testo       text not null,
              ordine      int default 0,
              obbligatorio boolean default true
            );
            alter table template_checklist_steps disable row level security;"

          run_sql "template_ricambi: tabella" \
            "create table if not exists template_ricambi (
              id          bigserial primary key,
              template_id bigint references asset_tipo_template(id) on delete cascade,
              ricambio_id bigint references ricambi(id) on delete set null,
              quantita    numeric(10,2) default 1,
              note        text
            );
            alter table template_ricambi disable row level security;"

          # ══════════════════════════════════════════════════════
          # FASE 4 — Storage bucket per allegati
          # ══════════════════════════════════════════════════════

          run_sql "storage: bucket allegati" \
            "insert into storage.buckets (id, name, public, file_size_limit)
             values ('allegati', 'allegati', false, 20971520)
             on conflict (id) do nothing;"

          # ══════════════════════════════════════════════════════
          # FASE 5 — Patch FK differite (sicure da eseguire dopo)
          # ══════════════════════════════════════════════════════

          run_sql "manutenzioni: FK assegnazione_id" \
            "do \$\$ begin
               if not exists (
                 select 1 from information_schema.table_constraints
                 where constraint_name = 'manutenzioni_assegnazione_id_fkey'
               ) then
