name: 🗄 Database Migration

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'
  workflow_dispatch:  # permette esecuzione manuale dal sito GitHub

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run migrations via Supabase CLI
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: nnsylkjahuhttwajuxls
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Installa Supabase CLI
          curl -fsSL https://supabase.com/install.sh | sh

          # Applica ogni file SQL in ordine
          for f in migrations/*.sql; do
            echo "▶ Applying $f"
            supabase db execute --project-ref $SUPABASE_PROJECT_ID \
              --password "$SUPABASE_DB_PASSWORD" \
              --file "$f"
            echo "✅ Done: $f"
          done
